name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v1.16.0)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 45
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' && secrets.SIGNING_STORE_PASSWORD != '' && secrets.SIGNING_KEY_ALIAS != '' && secrets.SIGNING_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Reconstruct local.properties + keystore from GitHub secrets so
      # release APKs can be signed in CI without committing credentials.
      # Secrets required (all optional — unsigned APKs still upload):
      #   SIGNING_KEYSTORE_BASE64, SIGNING_STORE_PASSWORD,
      #   SIGNING_KEY_ALIAS, SIGNING_KEY_PASSWORD.
      - name: Reconstruct signing config (if secrets present)
        if: env.HAS_RELEASE_SIGNING == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          STORE_PW: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PW: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > zeuswatch.jks
          {
            echo "RELEASE_STORE_FILE=../zeuswatch.jks"
            echo "RELEASE_STORE_PASSWORD=$STORE_PW"
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS"
            echo "RELEASE_KEY_PASSWORD=$KEY_PW"
          } >> local.properties

      # ZeusWatch has two product flavors:
      # standard = Google Play Services location + Wearable DataLayer + Gemini Nano
      # freenet  = F-Droid compatible, no proprietary dependencies
      - name: Build phone release APKs (standard + freenet)
        run: |
          ./gradlew :app:assembleStandardRelease --no-daemon
          ./gradlew :app:assembleFreenetRelease --no-daemon

      - name: Build wear release APK
        run: ./gradlew :wear:assembleRelease --no-daemon

      - name: Verify release APK 16 KB alignment
        run: >
          python3 tools/check_apk_alignment.py
          'app/build/outputs/apk/*/release/*.apk'
          'wear/build/outputs/apk/release/*.apk'

      - name: Generate Gradle dependency SBOM
        run: ./gradlew :app:dependencies --configuration standardReleaseRuntimeClasspath --no-daemon > dist-sbom-gradle.txt 2>&1 || true

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "name=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=" >> $GITHUB_OUTPUT
          fi

      - name: Collect + rename APKs
        id: apks
        run: |
          mkdir -p dist
          TAG="${{ steps.tag.outputs.name }}"
          VER="${TAG#v}"
          [ -z "$VER" ] && VER="$(date +%Y%m%d-%H%M%S)"
          for flavor in standard freenet; do
            dir="app/build/outputs/apk/${flavor}/release"
            for apk in "$dir"/*.apk; do
              base=$(basename "$apk" .apk)
              if echo "$base" | grep -q "arm64-v8a"; then
                abi="arm64-v8a"
              elif echo "$base" | grep -q "armeabi-v7a"; then
                abi="armeabi-v7a"
              elif echo "$base" | grep -q "universal"; then
                abi="universal"
              else
                abi="universal"
              fi
              cp "$apk" "dist/ZeusWatch-${flavor}-${abi}-v${VER}.apk"
            done
          done
          WR=$(find wear/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$WR" "dist/ZeusWatch-wear-v${VER}.apk"
          cp dist-sbom-gradle.txt "dist/SBOM-gradle-dependencies.txt"
          cd dist && sha256sum *.apk > SHA256SUMS.txt
          ls -lh

      - name: Upload release APKs as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-apks
          path: |
            dist/*.apk
            dist/SHA256SUMS.txt
            dist/SBOM-gradle-dependencies.txt

      - name: Upload APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && steps.tag.outputs.name != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --generate-notes --title "ZeusWatch $TAG"
          fi
          gh release upload "$TAG" dist/*.apk dist/SHA256SUMS.txt dist/SBOM-gradle-dependencies.txt --clobber
