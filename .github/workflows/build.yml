name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Detekt static analysis
        run: ./gradlew detekt --no-daemon

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: build/reports/detekt/

      - name: Check hardcoded user-facing strings
        run: python3 tools/check_localization.py

      - name: Run lint
        run: ./gradlew lintStandardDebug --no-daemon

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: app/build/reports/lint-results-*.html

      - name: Build phone (standard) debug APK
        run: ./gradlew :app:assembleStandardDebug --no-daemon

      - name: Build phone (freenet) debug APK
        run: ./gradlew :app:assembleFreenetDebug --no-daemon

      - name: Build wear debug APK
        run: ./gradlew :wear:assembleDebug --no-daemon

      - name: Upload phone standard APK
        uses: actions/upload-artifact@v7
        with:
          name: nimbus-standard-debug
          path: app/build/outputs/apk/standard/debug/*.apk

      - name: Upload phone freenet APK
        uses: actions/upload-artifact@v7
        with:
          name: nimbus-freenet-debug
          path: app/build/outputs/apk/freenet/debug/*.apk

      - name: Upload wear APK
        uses: actions/upload-artifact@v7
        with:
          name: nimbus-wear-debug
          path: wear/build/outputs/apk/debug/*.apk

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run phone unit tests
        run: ./gradlew :app:testStandardDebugUnitTest --no-daemon

      - name: Run wear unit tests
        run: ./gradlew :wear:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            wear/build/reports/tests/

  instrumented-test:
    name: Instrumented UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Compose UI tests with accessibility checks
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: ./gradlew :app:connectedStandardDebugAndroidTest --no-daemon

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-results
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/

  release-build:
    name: Build Release APK (unsigned verification)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ build, test, instrumented-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      # Builds release-variant bytecode through R8 / ProGuard so CI catches
      # shrinker regressions (e.g. missing keep rules for Gemini Nano) early.
      # Signing is performed in release.yml where the keystore secrets live.
      - name: Build phone release APKs
        run: |
          ./gradlew :app:assembleStandardRelease --no-daemon
          ./gradlew :app:assembleFreenetRelease --no-daemon

      - name: Build wear release APK
        run: ./gradlew :wear:assembleRelease --no-daemon

      - name: Upload phone release APKs
        uses: actions/upload-artifact@v7
        with:
          name: nimbus-release-apks
          path: app/build/outputs/apk/*/release/*.apk

      - name: Upload wear release APK
        uses: actions/upload-artifact@v7
        with:
          name: nimbus-wear-release-apk
          path: wear/build/outputs/apk/release/*.apk
