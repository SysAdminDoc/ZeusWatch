name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '23 10 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Cache Gradle packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Detekt static analysis
        run: ./gradlew detekt --no-daemon

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: detekt-reports
          path: build/reports/detekt/

      - name: Check hardcoded user-facing strings
        run: python3 tools/check_localization.py

      - name: Test provider contract smoke tool
        run: python3 -m unittest discover -s tools -p '*_test.py'

      - name: Run lint
        run: ./gradlew lintStandardDebug --no-daemon

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-*.html

      - name: Build phone (standard) debug APK
        run: ./gradlew :app:assembleStandardDebug --no-daemon

      - name: Build phone (freenet) debug APK
        run: ./gradlew :app:assembleFreenetDebug --no-daemon

      - name: Build wear debug APK
        run: ./gradlew :wear:assembleDebug --no-daemon

      - name: Verify debug APK 16 KB alignment
        run: >
          python3 tools/check_apk_alignment.py
          'app/build/outputs/apk/standard/debug/*.apk'
          'app/build/outputs/apk/freenet/debug/*.apk'
          'wear/build/outputs/apk/debug/*.apk'

      - name: Upload phone standard APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nimbus-standard-debug
          path: app/build/outputs/apk/standard/debug/*.apk

      - name: Upload phone freenet APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nimbus-freenet-debug
          path: app/build/outputs/apk/freenet/debug/*.apk

      - name: Upload wear APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nimbus-wear-debug
          path: wear/build/outputs/apk/debug/*.apk

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Cache Gradle packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run phone unit tests
        run: ./gradlew :app:testStandardDebugUnitTest --no-daemon

      - name: Run wear unit tests
        run: ./gradlew :wear:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            wear/build/reports/tests/

  firestore-rules:
    name: Firestore Rules Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run Firestore rules emulator tests
        run: npm run test:firestore-rules

      - name: Upload emulator logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: firestore-emulator-logs
          path: |
            firebase-debug.log
            firestore-debug.log

  instrumented-test:
    name: Instrumented UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Cache Gradle packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Compose UI tests with accessibility checks
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: ./gradlew :app:connectedStandardDebugAndroidTest --no-daemon

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: instrumented-test-results
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/

  release-build:
    name: Build Release APK (unsigned verification)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ build, test, instrumented-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Cache Gradle packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      # Builds release-variant bytecode through R8 / ProGuard so CI catches
      # shrinker regressions (e.g. missing keep rules for Gemini Nano) early.
      # Signing is performed in release.yml where the keystore secrets live.
      - name: Build phone release APKs
        run: |
          ./gradlew :app:assembleStandardRelease --no-daemon
          ./gradlew :app:assembleFreenetRelease --no-daemon

      - name: Build wear release APK
        run: ./gradlew :wear:assembleRelease --no-daemon

      - name: Verify release APK 16 KB alignment
        run: >
          python3 tools/check_apk_alignment.py
          'app/build/outputs/apk/*/release/*.apk'
          'wear/build/outputs/apk/release/*.apk'

      - name: Upload phone release APKs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nimbus-release-apks
          path: app/build/outputs/apk/*/release/*.apk

      - name: Upload wear release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nimbus-wear-release-apk
          path: wear/build/outputs/apk/release/*.apk

  provider-contract-smoke:
    name: Provider Contract Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Cache provider contract responses
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .provider-contract-cache
          key: provider-contracts-${{ github.run_id }}
          restore-keys: provider-contracts-

      - name: Run low-rate provider contract checks
        run: python3 tools/check_provider_contracts.py --cache-dir .provider-contract-cache --json-report build/reports/provider-contracts.json

      - name: Upload provider contract report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: provider-contract-report
          path: build/reports/provider-contracts.json
